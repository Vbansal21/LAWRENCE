contracts:
  - name: web-search
    method: POST
    path: /webhook/lawrence/web-search
    request:
      query: string
      limit: integer
    response:
      hits:
        - title: string
          url: string
          snippet: string
  - name: zettel-ingest
    method: POST
    path: /webhook/lawrence/zettel-ingest
    request:
      summary: string
      tags: array
      entities: array
    response:
      note_id: string
      path: string
