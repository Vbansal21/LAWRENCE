name: lawrence-kernel
base_url: http://127.0.0.1:8000
auth: none
endpoints:
  - method: GET
    path: /health
    purpose: health and provider readiness
    response_fields: [status, app, version, providers]
  - method: POST
    path: /v1/turns
    purpose: process a turn through parallel facets
    request_fields: [trigger_type, user_query, context, force_web]
    response_fields: [snapshot, merge_decision, facet_results, distillation_records]
