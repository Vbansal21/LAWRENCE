contracts:
  - name: web.search
    risk_level: low
    requires_confirmation: false
    input_schema:
      type: object
      properties:
        query:
          type: string
      required: [query]
    output_schema:
      type: object
      properties:
        hits:
          type: array
  - name: local.command
    risk_level: medium
    requires_confirmation: true
    input_schema:
      type: object
      properties:
        intent:
          type: string
      required: [intent]
    output_schema:
      type: object
      properties:
        status:
          type: string
        stdout:
          type: string
