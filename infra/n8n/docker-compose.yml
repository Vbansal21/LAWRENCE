services:
  n8n:
    image: n8nio/n8n:latest
    container_name: lawrence-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-127.0.0.1}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${N8N_HOST:-127.0.0.1}:${N8N_PORT:-5678}
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-UTC}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=${N8N_BLOCK_ENV_ACCESS_IN_NODE:-false}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE:-true}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-lawrence}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-change-me-local-only}
      - LAWRENCE_KERNEL_BASE=${LAWRENCE_KERNEL_BASE:-http://host.docker.internal:8000}
      - LLAMACPP_BASE=${LLAMACPP_BASE:-http://host.docker.internal:8080}
      - LMSTUDIO_BASE=${LMSTUDIO_BASE:-http://host.docker.internal:1234}
    volumes:
      - n8n_data:/home/node/.n8n
      - ../../modules/connectors/n8n/workflows:/seed-workflows:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5678/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  n8n_data:
